name: Starmap publish layer (git)
description: Publish a git-sourced layer version to the c12s starmap registry

inputs:
  starmapUrl:
    description: Base URL of the starmap gateway
    required: true
  command:
    description: build command run at deploy time
    required: false
    default: ""
  semver:
    description: version label; empty falls back to git tag, then starmap auto-increment
    required: false
    default: ""
  nodeType:
    description: "StoredProcedure | Trigger"
    required: false
    default: StoredProcedure

runs:
  using: composite
  steps:
    - name: Resolve version
      id: ver
      shell: bash
      run: |
        SEMVER="${{ inputs.semver }}"
        if [ -z "$SEMVER" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
          SEMVER="$GITHUB_REF_NAME"
        fi
        echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

    - name: Notify starmap
      shell: bash
      run: |
        BODY="{\"sourceType\":\"git\",\"nodeType\":\"${{ inputs.nodeType }}\",\"pull\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}\",\"command\":\"${{ inputs.command }}\",\"sha\":\"${GITHUB_SHA}\",\"semver\":\"${{ steps.ver.outputs.semver }}\"}"
        echo "POST ${{ inputs.starmapUrl }}/apis/core/v1/layer"
        echo "$BODY"
        curl -sf -X POST "${{ inputs.starmapUrl }}/apis/core/v1/layer" \
          -H "Content-Type: application/json" \
          -d "$BODY"
