name: Starmap publish layer (git)
description: Publish a git-sourced layer version to the c12s starmap registry

inputs:
  starmapUrl:
    description: Base URL of the starmap gateway
    required: true
  semver:
    description: version to publish (e.g. v1.0.0)
    required: true
  command:
    description: build command run at deploy time
    required: false
    default: ""
  arch:
    description: build architecture (x86_64 | arm64 | ...)
    required: false
    default: x86_64
  nodeType:
    description: "StoredProcedure | Trigger | Event | Entrypoint"
    required: false
    default: StoredProcedure

runs:
  using: composite
  steps:
    - name: Notify starmap
      shell: bash
      run: |
        BODY="{\"sourceType\":\"git\",\"nodeType\":\"${{ inputs.nodeType }}\",\"pull\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}\",\"command\":\"${{ inputs.command }}\",\"sha\":\"${GITHUB_SHA}\",\"semver\":\"${{ inputs.semver }}\",\"arch\":\"${{ inputs.arch }}\"}"
        echo "POST ${{ inputs.starmapUrl }}/apis/core/v1/layer"
        echo "$BODY"
        curl -sf -X POST "${{ inputs.starmapUrl }}/apis/core/v1/layer" \
          -H "Content-Type: application/json" \
          -d "$BODY"
