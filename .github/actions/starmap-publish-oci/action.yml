name: Starmap publish layer (oci)
description: Build a unikernel, push it to an OCI registry, and register the version in starmap

inputs:
  starmapUrl:
    description: Base URL of the starmap gateway
    required: true
  image:
    description: OCI image without tag, e.g. ghcr.io/owner/name
    required: true
  ghcrToken:
    description: token for GHCR login
    required: true
  semver:
    description: version to publish (e.g. v1.0.0); also used as the GHCR tag
    required: true
  arch:
    description: build architecture (x86_64 | arm64 | ...)
    required: false
    default: x86_64
  nodeType:
    description: "StoredProcedure | Trigger | Event | Entrypoint"
    required: false
    default: StoredProcedure

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcrToken }}

    - name: Build and push unikernel
      uses: unikraft/kraftkit@stable
      with:
        workdir: .
        arch: ${{ inputs.arch }}
        plat: qemu
        output: oci://${{ inputs.image }}:${{ inputs.semver }}
        push: true

    - name: Resolve digest
      id: digest
      shell: bash
      run: |
        DIGEST=$(docker buildx imagetools inspect ${{ inputs.image }}:${{ inputs.semver }} --format '{{.Manifest.Digest}}' 2>/dev/null || true)
        if [ -z "$DIGEST" ]; then DIGEST="${GITHUB_SHA}"; fi
        echo "sha=$DIGEST" >> "$GITHUB_OUTPUT"

    - name: Notify starmap
      shell: bash
      run: |
        BODY="{\"sourceType\":\"oci\",\"nodeType\":\"${{ inputs.nodeType }}\",\"image\":\"${{ inputs.image }}\",\"sha\":\"${{ steps.digest.outputs.sha }}\",\"semver\":\"${{ inputs.semver }}\",\"arch\":\"${{ inputs.arch }}\"}"
        echo "POST ${{ inputs.starmapUrl }}/apis/core/v1/layer"
        echo "$BODY"
        curl -sf -X POST "${{ inputs.starmapUrl }}/apis/core/v1/layer" \
          -H "Content-Type: application/json" \
          -d "$BODY"
