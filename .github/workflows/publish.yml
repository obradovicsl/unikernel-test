name: Publish layer to starmap

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish (oci source)
        uses: ./.github/actions/starmap-publish-oci
        with:
          starmapUrl: https://diligent-smuggler-lanky.ngrok-free.dev
          image: ghcr.io/${{ github.repository_owner }}/unikernel-test
          ghcrToken: ${{ secrets.GITHUB_TOKEN }}
          nodeType: StoredProcedure
