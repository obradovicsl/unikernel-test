name: Publish layer to starmap

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish (git source)
        uses: ./.github/actions/starmap-publish
        with:
          starmapUrl: https://diligent-smuggler-lanky.ngrok-free.dev
          sourceType: git
          command: "make build"
